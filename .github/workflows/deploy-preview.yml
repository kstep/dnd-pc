name: Deploy branch preview

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preview-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Build
        run: trunk build --release --public-url /dnd-pc/preview/${{ github.ref_name }}/
        env:
          BASE_URL: /dnd-pc/preview/${{ github.ref_name }}

      - name: Optimize WASM with wasm-opt
        run: |
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/version_123/binaryen-version_123-x86_64-linux.tar.gz | tar xz
          for f in dist/*.wasm; do
            binaryen-version_123/bin/wasm-opt --all-features -Oz "$f" -o "$f.opt" && mv "$f.opt" "$f"
          done

      - name: Copy index.html to 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: preview-build
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: preview-build
          path: dist

      - name: Deploy preview to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          target-folder: preview/${{ github.ref_name }}
