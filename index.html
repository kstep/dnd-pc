  <script>
    (function() {
      var origFetch = window.fetch;
      window.fetch = function(url, opts) {
        var result = origFetch.call(this, url, opts);
        if (String(url).endsWith('.wasm')) {
          return result.then(function(response) {
            var contentLength = +response.headers.get('content-length');
            if (!contentLength || !response.body) return response;
            var reader = response.body.getReader();
            var received = 0;
            var clipRect = document.getElementById('d20-clip-rect');
            var wave = document.getElementById('d20-wave');
            var minY = 263, maxY = 742, range = maxY - minY;
            return new Response(
              new ReadableStream({
                pull: function(controller) {
                  return reader.read().then(function(result) {
                    if (result.done) {
                      if (clipRect) { clipRect.setAttribute('y', String(minY)); clipRect.setAttribute('height', String(range)); }
                      if (wave) wave.style.display = 'none';
                      controller.close();
                      return;
                    }
                    received += result.value.length;
                    if (clipRect) {
                      var progress = Math.min(received / contentLength, 1);
                      var h = range * progress;
                      var y = maxY - h;
                      clipRect.setAttribute('y', String(y - 8));
                      clipRect.setAttribute('height', String(h + 8));
                      if (wave) wave.setAttribute('transform', 'translate(0,' + y + ')');
                    }
                    controller.enqueue(result.value);
                  });
                }
              }),
              { headers: response.headers, status: response.status, statusText: response.statusText }
            );
          });
        }
        return result;
      };
    })();
  </script>

  // Resolved by the module script below once Firebase is ready.
  // WASM awaits this promise before calling any Firebase APIs.
  window.__firebaseReady = new Promise(r => { window.__firebaseResolve = r; });
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
  import {
    getAuth,
    signInAnonymously,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithCredential,
    linkWithPopup,
    onAuthStateChanged,
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
  import {
    getFirestore,
    doc as fsDoc,
    setDoc as fsSetDoc,
    getDoc as fsGetDoc,
    getDocs as fsGetDocs,
    deleteDoc as fsDeleteDoc,
    collection as fsCollection,
    onSnapshot,
    query as fsQuery,
    where as fsWhere,
  } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

  // Replace with your Firebase project config
  const firebaseConfig = {
    apiKey: "AIzaSyAZmoMWsdVZKzJL5Xl_am_j7RmFAD4ehL8",
    authDomain: "dnd-pc-d6388.firebaseapp.com",
    projectId: "dnd-pc-d6388",
    storageBucket: "dnd-pc-d6388.firebasestorage.app",
    messagingSenderId: "203441079138",
    appId: "1:203441079138:web:679173901bc4eec176223b"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  window.__firebase = {
    signInAnonymously: () => signInAnonymously(auth),
    linkWithGoogle: async () => {
      const user = auth.currentUser;
      if (user) {
        try {
          return await linkWithPopup(user, googleProvider);
        } catch (error) {
          if (error.code === "auth/credential-already-in-use") {
            // Google account already linked to another user — sign into that
            // existing account directly (which has the original UID + data).
            return await signInWithPopup(auth, googleProvider);
          }
          throw error;
        }
      }
      // No current user — sign in directly
      return signInWithPopup(auth, googleProvider);
    },
    currentUid: () => (auth.currentUser ? auth.currentUser.uid : null),
    // Resolves once auth state is settled (including pending redirects).
    // Returns { uid, isAnonymous } or null if no user.
    waitForAuth: () => new Promise(resolve => {
      const unsubscribe = onAuthStateChanged(auth, (user) => {
        unsubscribe();
        resolve(user ? { uid: user.uid, isAnonymous: user.isAnonymous } : null);
      });
    }),
    onAuthStateChanged: (cb) =>
      onAuthStateChanged(auth, (user) => cb(user ? user.uid : null)),
    setDoc: (data, ...path) => fsSetDoc(fsDoc(db, ...path), data),
    getDoc: async (...path) => {
      const snap = await fsGetDoc(fsDoc(db, ...path));
      return snap.exists() ? snap.data() : null;
    },
    getDocs: async (...path) => {
      const snap = await fsGetDocs(fsCollection(db, ...path));
      return snap.docs.map((d) => d.data());
    },
    deleteDoc: (...path) => fsDeleteDoc(fsDoc(db, ...path)),
    onSnapshot: (callback, conditions, ...path) => {
      let colRef = fsCollection(db, ...path);
      if (conditions) {
        for (const [field, op, value] of conditions) {
          colRef = fsQuery(colRef, fsWhere(field, op, value));
        }
      }
      return onSnapshot(
        colRef,
        { source: "server" },
        (snapshot) => {
          const changes = snapshot.docChanges().map((change) => ({
            type: change.type,
            data: change.doc.data(),
            id: change.doc.id,
          }));
          callback(changes);
        }
      );
    },
  };
  window.__firebaseResolve();
</script>
