<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <!-- D20 shape: icosahedron front face -->
  <polygon points="32,2 60,48 4,48" fill="url(#face)" stroke="#312e81" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner triangles -->
  <polygon points="32,2 18,25 46,25" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-linejoin="round" opacity="0.6"/>
  <polygon points="18,25 4,48 32,48" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-linejoin="round" opacity="0.6"/>
  <polygon points="46,25 32,48 60,48" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-linejoin="round" opacity="0.6"/>
  <polygon points="18,25 46,25 32,48" fill="none" stroke="#818cf8" stroke-width="1.2" stroke-linejoin="round" opacity="0.6"/>
  <!-- "20" text -->
  <text x="32" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="bold" font-size="18" fill="#e0e7ff">20</text>
</svg>
